<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Kalasanapeli</title>

  <link rel="stylesheet" href="sanapeli.css">
</head>
<body>

  <h1>Kalasanapeli</h1>
  <p class="description">Arvaa mikä kala on kyseessä. Kirjaimet ovat sekaisin.</p>

  <p id="score">Pisteet: 0 / 12</p>

  <div id="scrambled"></div>

  <input type="text" id="guess" placeholder="Kirjoita kalan nimi..." autocomplete="off">
  <br>
  <button id="checkBtn">Tarkista</button>
  <button id="nextBtn">Seuraava sana</button>

  <div id="message"></div>

  <script src="sanapeli.js"></script>

</body>
</html>
